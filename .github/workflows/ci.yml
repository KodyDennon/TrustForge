name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' typecheck
      - run: bun test
      - run: bun run tools/tf-schema/src/cli.ts validate-all
      - run: bun run tools/tf-schema/src/cli.ts lint
      - name: agent-contract-check
        run: |
          bun run tools/tf-schema/src/cli.ts agent-contract-check \
            examples/agent-contracts/full.yaml \
            --catalog examples/dangerous-actions/tf-dangerous-std.yaml
      - name: codegen-diff
        run: |
          bun run tools/tf-schema/src/cli.ts codegen --target ts
          bun run tools/tf-schema/src/cli.ts codegen --target rust
          bun run tools/tf-schema/src/cli.ts codegen --target docs
          bun run tools/tf-schema/src/cli.ts codegen --target rpc-ts \
            --spec examples/proofrpc/code-helper.tfrpc.yaml
          bun run tools/tf-schema/src/cli.ts codegen --target rpc-rust \
            --spec examples/proofrpc/code-helper.tfrpc.yaml \
            --out crates/tf-code-helper-example/src/generated
          bun run tools/tf-schema/src/cli.ts codegen --target agent-contract-ts \
            --spec examples/agent-contracts/full.yaml
          bun run tools/tf-schema/src/cli.ts codegen --target agent-contract-rust \
            --spec examples/agent-contracts/full.yaml
          bun run tools/tf-schema/src/cli.ts parity
          git diff --exit-code
      - run: bun run tools/tf-schema/src/cli.ts fuzz --iterations 200
      - run: bun run tools/tf-schema/src/cli.ts parity
      - name: conformance gate (B11)
        run: bun run tools/tf-conformance/src/cli.ts run
      - name: tf-session smoke test (in-memory + Bun WebSocket carrier)
        run: |
          bun test tools/tf-session/tests/e2e.test.ts
      - name: tf-daemon smoke test
        run: |
          bun test tools/tf-daemon/tests/e2e.test.ts
      - name: full-stack end-to-end
        run: |
          bun test tools/tf-daemon/tests/full-stack.test.ts
      - name: plugin registry smoke test
        run: |
          bun test tools/tf-types-ts/tests/plugin.test.ts
      - name: compatibility bridge smoke test
        run: |
          bun test tools/tf-types-ts/tests/bridge-spiffe.test.ts
          bun test tools/tf-types-ts/tests/bridge-webauthn.test.ts
          bun test tools/tf-types-ts/tests/bridge-mcp.test.ts
          bun test tools/tf-types-ts/tests/bridge-oauth.test.ts
          bun test tools/tf-types-ts/tests/bridge-tls.test.ts
          bun test tools/tf-types-ts/tests/webauthn-attestation.test.ts
          bun test tools/tf-types-ts/tests/bridge-parity-vectors.test.ts
      - name: policy + posture overlays smoke test
        run: |
          bun test tools/tf-types-ts/tests/negative-capability.test.ts
          bun test tools/tf-types-ts/tests/continuous-reauth.test.ts
          bun test tools/tf-types-ts/tests/trust-overlay.test.ts
      - name: sprint-2 sweep (auth/policy/proof core)
        run: |
          bun test tools/tf-types-ts/tests/bridge-gnap.test.ts
          bun test tools/tf-types-ts/tests/policy-engine.test.ts
          bun test tools/tf-types-ts/tests/quorum.test.ts
          bun test tools/tf-types-ts/tests/offline-approval.test.ts
          bun test tools/tf-types-ts/tests/permission.test.ts
          bun test tools/tf-types-ts/tests/bundle.test.ts
          bun test tools/tf-types-ts/tests/tf-manifests.test.ts
          bun test tools/tf-daemon/tests/manifests.test.ts
      - name: sprint-3 sweep (protocol depth)
        run: |
          bun test tools/tf-types-ts/tests/rpc-kinds.test.ts
          bun test tools/tf-types-ts/tests/hybrid-pq.test.ts
          bun test tools/tf-types-ts/tests/session-migration.test.ts
          bun test tools/tf-types-ts/tests/relay.test.ts
      - name: sprint-4 sweep (packet + evidence)
        run: |
          bun test tools/tf-types-ts/tests/packet.test.ts
          bun test tools/tf-types-ts/tests/evidence.test.ts
      - name: sprint-5 sweep (bridges + sandbox + sim + federation)
        run: |
          bun test tools/tf-types-ts/tests/bridge-did.test.ts
          bun test tools/tf-types-ts/tests/bridges-sprint5.test.ts
          bun test tools/tf-types-ts/tests/plugin-sandbox.test.ts
          bun test tools/tf-types-ts/tests/simulation.test.ts
          bun test tools/tf-types-ts/tests/federation.test.ts
      - name: tf-proof smoke test
        run: |
          mkdir -p /tmp/tf-proof-ci
          bun run tools/tf-proof/src/cli.ts keygen --out /tmp/tf-proof-ci
          cat > /tmp/tf-proof-ci/events.json <<'JSON'
          [
            {
              "event_version": "1",
              "id": "ci-evt-1",
              "type": "ci.sample",
              "actor_id": "tf:actor:agent:example.com/ci",
              "timestamp": "2026-04-24T12:00:00Z",
              "level": "L1",
              "signature": {
                "algorithm": "ed25519",
                "signer": "tf:actor:agent:example.com/ci",
                "signature": "AAAA"
              }
            }
          ]
          JSON
          bun run tools/tf-proof/src/cli.ts sign \
            --events /tmp/tf-proof-ci/events.json \
            --key /tmp/tf-proof-ci/tf.ed25519.key.json \
            --signer tf:actor:organization:example.com \
            --out /tmp/tf-proof-ci/bundle.tfproof
          bun run tools/tf-proof/src/cli.ts verify /tmp/tf-proof-ci/bundle.tfproof --key /tmp/tf-proof-ci/tf.ed25519.pub.json
          bun run tools/tf-proof/src/cli.ts inspect /tmp/tf-proof-ci/bundle.tfproof

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # cargo fmt + clippy are advisory gates in v0.1.0 — they surface
      # formatting / lint drift but don't fail CI yet. Promoted to hard
      # gates after a sweep cleanup pass.
      - run: cargo fmt --all -- --check || echo "::warning::cargo fmt drift"
      - run: cargo clippy --workspace --all-targets || echo "::warning::clippy lints"
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace
      # Codegen-diff on the Rust side: regenerating the generated
      # bindings from schemas + protos must be a no-op against the
      # committed code. (FIND-057)
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - name: rust codegen-diff
        run: |
          bun run tools/tf-schema/src/cli.ts codegen --target rust
          bun run tools/tf-schema/src/cli.ts codegen --target rpc-rust \
            --spec examples/proofrpc/code-helper.tfrpc.yaml \
            --out crates/tf-code-helper-example/src/generated
          bun run tools/tf-schema/src/cli.ts codegen --target agent-contract-rust \
            --spec examples/agent-contracts/full.yaml
          git diff --exit-code

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace --all-features
