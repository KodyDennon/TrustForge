name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  npm-publish:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for NPM OIDC Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          
      # NOTE: OIDC trusted publishing must be configured per-package on
      # npmjs.com for this to work; the v0.1.3 release fell back to a
      # local `npm publish --workspaces` with a token because it wasn't.
      # Failures must be loud — the old `|| true` marked the v0.1.3 npm
      # job green while every PUT was rejected (E404 on PUT = auth).
      - name: Publish to NPM via OIDC
        run: |
          npm publish --workspaces --access public --provenance
          npm publish --access public --provenance

  cargo-publish:
    name: Publish Cargo Crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Publish Crates
        run: bash scripts/publish-crates.sh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
