[package]
name = "tf-cortex-m-lora-example"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "TrustForge embedded reference: Cortex-M LoRa node (STM32WL55) — receive, verify, sign, forward."
publish = false

# Standalone package — intentionally not a workspace member of the
# top-level TrustForge workspace, because this crate targets
# `thumbv7em-none-eabihf` and pulls in embassy / probe-rs which would
# break a host-side `cargo build`. See README.md for the build flow.
[workspace]

[[bin]]
name = "tf-cortex-m-lora-example"
path = "src/main.rs"
test = false
bench = false

[dependencies]
# embassy async stack for STM32WL55JC (Cortex-M4F + LoRa SubGHz radio)
embassy-stm32 = { version = "0.1", features = [
    "defmt",
    "stm32wl55jc-cm4",
    "time-driver-any",
    "exti",
    "memory-x",
    "unstable-pac",
] }
embassy-executor = { version = "0.5", features = [
    "arch-cortex-m",
    "executor-thread",
    "defmt",
    "integrated-timers",
] }
embassy-time = { version = "0.3", features = ["defmt", "defmt-timestamp-uptime"] }
embassy-sync = { version = "0.5", features = ["defmt"] }
embassy-lora = { version = "0.1", features = ["stm32wl", "defmt"] }

cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

# TrustForge embedded core (Phase K1) — verify + sign + ORL + replay-protect.
tf-core-no-std = { path = "../../../crates/tf-core-no-std", default-features = false }
tf-embedded-hal = { path = "../../../crates/tf-embedded-hal" }

heapless = "0.8"

[profile.release]
codegen-units = 1
debug = 2
lto = "fat"
opt-level = "s"
overflow-checks = false

[profile.dev]
codegen-units = 1
debug = 2
opt-level = "s"
overflow-checks = true
