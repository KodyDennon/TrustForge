PACKAGE_NAME="trustforge-lsm"
PACKAGE_VERSION="0.1.0"
CLEAN="make -C . clean"
MAKE[0]="make -C . KDIR=/lib/modules/${kernelver}/build module"
BUILT_MODULE_NAME[0]="trustforge_lsm"
BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_LOCATION[0]="/extra"
AUTOINSTALL="yes"
REMAKE_INITRD="no"

# Compatibility: requires Linux kernel >= 5.15 with CONFIG_SECURITY=y,
# CONFIG_SECURITY_NETWORK=y, and the LSM stacking interface introduced
# in 5.7 (security_add_hooks).
