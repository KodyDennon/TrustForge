# /etc/pam.d/sshd — example snippet showing pam_trustforge integration.
#
# Insert these lines BEFORE existing auth/account/session stacks so a
# TrustForge deny short-circuits the normal Unix authentication paths.
# `session optional` is intentional: a misbehaving daemon must not lock
# you out of an existing host that already authenticated you.
#
# Once verified working in your environment, you can promote
# `session optional` to `session required` to harden the policy.

# ---- TrustForge bridge ----
auth    required   pam_trustforge.so
account required   pam_trustforge.so
session optional   pam_trustforge.so

# ---- Existing distro defaults (illustrative — do not duplicate) ----
# auth      include   common-auth
# account   include   common-account
# session   include   common-session
# password  include   common-password
