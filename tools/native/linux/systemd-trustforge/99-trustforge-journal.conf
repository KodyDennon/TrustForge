# /etc/systemd/journald.conf.d/99-trustforge-journal.conf
#
# TrustForge proof events (decision records, capability grants/revocations,
# session attestations) are durable evidence — they must survive routine
# log rotation. tf-daemon emits these with SYSLOG_IDENTIFIER=tf-proof so
# they can be filtered without parsing free-text log lines:
#
#   journalctl SYSLOG_IDENTIFIER=tf-proof
#   journalctl -u tf-daemon -t tf-proof -o json
#
# This drop-in raises journal sizing so a busy daemon does not silently
# discard proof events between rotations. It does NOT change the global
# Storage= setting; sites that prefer volatile journals can override it.

[Journal]
SystemMaxUse=2G
SystemKeepFree=512M
SystemMaxFileSize=128M
SystemMaxFiles=64
RuntimeMaxUse=256M
MaxRetentionSec=1month
MaxFileSec=1week

# Forward to syslog for sites that ship proof events to a central SIEM.
ForwardToSyslog=yes

# Compress on-disk journals; proof events are repetitive JSON and
# compress well.
Compress=yes
Seal=yes
