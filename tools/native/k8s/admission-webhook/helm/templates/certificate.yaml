{{- if .Values.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tf-admission-webhook.fullname" . }}
  labels: {{- include "tf-admission-webhook.labels" . | nindent 4 }}
spec:
  secretName: {{ include "tf-admission-webhook.fullname" . }}-tls
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - {{ include "tf-admission-webhook.fullname" . }}
    - {{ include "tf-admission-webhook.fullname" . }}.{{ .Release.Namespace }}
    - {{ include "tf-admission-webhook.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "tf-admission-webhook.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.certManager.issuerRef.name }}
    kind: {{ .Values.certManager.issuerRef.kind }}
{{- end -}}
