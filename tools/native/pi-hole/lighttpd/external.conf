#
# Pi-hole lighttpd snippet: forward access-control queries to the
# local tf-pihole-policy sidecar (see ../cmd/tf-pihole-policy/).
#
# Drop this file at /etc/lighttpd/conf-available/15-trustforge.conf
# and enable it:
#
#   sudo lighttpd-enable-mod trustforge
#   sudo systemctl reload lighttpd
#
# The mapping below intercepts the Pi-hole admin endpoints we want
# TrustForge to gate (queries.php, api.php, scripts/pi-hole/*) and
# rewrites them to a plain HTTP call against the sidecar. The sidecar
# translates the lighttpd query-string parameters into a
# /v1/decide call and replies with HTTP 200 (allow) or 403 (deny).
#
# Pi-hole's lighttpd config is generated by `pihole -a -i`; this
# snippet is intentionally a "drop-in" that does not require
# Pi-hole's generator to be aware of TrustForge.

server.modules += ( "mod_proxy", "mod_rewrite", "mod_setenv" )

$HTTP["url"] =~ "^/admin/(api|queries)\.php" {
    # Tag the request with a TrustForge correlation ID so the sidecar
    # can join its decide log to lighttpd's access log.
    setenv.add-request-header = (
        "X-TrustForge-Correlation" => "lighttpd-${time.utc}"
    )

    # Probe the sidecar synchronously. The sidecar is expected at
    # 127.0.0.1:8788; override by editing this file or running it on
    # a different port via tf-pihole-policy --addr.
    proxy.server = ( "" => (
        ( "host" => "127.0.0.1", "port" => 8788 )
    ))
    proxy.header = (
        "upgrade" => "disable"
    )
}

# A second mapping for the gravity-refresh hook page so an
# administrator-triggered manual refresh also flows through the
# decide path.
$HTTP["url"] =~ "^/admin/scripts/pi-hole/php/gravity\.php" {
    proxy.server = ( "" => (
        ( "host" => "127.0.0.1", "port" => 8788 )
    ))
}
