[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustforge-django"
version = "0.1.0"
description = "Django middleware + view decorator for TrustForge tf-daemon."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "trustforge-client",
    "Django>=4.2",
    "asgiref>=3.7",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
include = ["trustforge_django*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
