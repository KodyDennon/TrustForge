[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustforge-starlette"
version = "0.1.0"
description = "Starlette ASGI middleware for TrustForge tf-daemon."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "trustforge-client",
    "starlette>=0.36",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.setuptools.packages.find]
include = ["trustforge_starlette*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
