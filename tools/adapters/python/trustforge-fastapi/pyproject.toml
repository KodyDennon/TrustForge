[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustforge-fastapi"
version = "0.1.0"
description = "FastAPI dependency for TrustForge `tf-daemon` capability checks."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "trustforge-client",
    "fastapi>=0.110",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.uv.sources]
trustforge-client = { path = "../trustforge-client", editable = true }

[tool.setuptools.packages.find]
include = ["trustforge_fastapi*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
