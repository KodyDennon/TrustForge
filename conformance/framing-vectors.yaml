# Binary framing parity vectors.
#
# `.tflog` and `.tfproof` are byte-level formats; both runtimes must
# produce identical output for identical inputs. Each case supplies a
# raw structure; the test computes the canonical framing and asserts
# the hex of the output matches `expect.framed_hex`.
#
# Signatures here are placeholder bytes — the framing is independent of
# whether the signature verifies.

tflog:
  - name: single-event-log
    events:
      - event_version: "1"
        id: "evt-1"
        type: "session.established"
        actor_id: "tf:actor:agent:example.com/a"
        timestamp: "2026-04-24T12:00:00Z"
        level: "L1"
        signature:
          algorithm: "ed25519"
          signer: "tf:actor:agent:example.com/a"
          signature: "AAAA"
    expected_hex: ""

tfproof:
  - name: minimal-bundle
    bundle:
      bundle_version: "1"
      events:
        - event_version: "1"
          id: "evt-1"
          type: "session.established"
          actor_id: "tf:actor:agent:example.com/a"
          timestamp: "2026-04-24T12:00:00Z"
          level: "L1"
          signature:
            algorithm: "ed25519"
            signer: "tf:actor:agent:example.com/a"
            signature: "AAAA"
      signature:
        algorithm: "ed25519"
        signer: "tf:actor:organization:example.com"
        signature: "QkJCQg=="
    signature_hex: "cafebabe"
    expected_hex: ""
