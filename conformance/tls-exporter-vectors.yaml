# TLS exporter binding test vectors.
#
# Generated by the same algorithm as `TlsBridge.deriveExporterKey` in
# `tools/tf-types-ts/src/core/bridge-tls.ts` and `ExporterBinding::derive` in
# `crates/tf-types/src/bridge_tls.rs`. Both implementations must produce the
# `expected_hex` output for the supplied inputs.
#
# Algorithm (SHA-256 throughout):
#   salt   = utf8("tf-tls-exporter:" + label)
#   ikm    = transport_secret || context
#   prk1   = HMAC-SHA256(salt, ikm)
#   prk2   = HMAC-SHA256(zeros[32], prk1)        # HKDF-Extract w/ default salt
#   okm    = HKDF-Expand-SHA256(prk2, info=salt, length)
#
# This is layered on top of an RFC 5705 transport exporter — `transport_secret`
# is the bytes returned by the TLS / QUIC stack's `exporter()` API.

version: 1
vectors:
  - name: zero-context-32-byte
    label: tf-session-binding
    transport_secret_hex: "000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f"
    context_hex: ""
    length: 32
    expected_hex: "97c45446f2dafe3a8283909cd3938650c0deaa5f94d9061b198272e4c1f8e4f8"

  - name: with-context-64-byte
    label: tf-quic-binding
    transport_secret_hex: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    context_hex: "73657373696f6e2d69643a616263313233"  # "session-id:abc123"
    length: 64
    expected_hex: "d6800e1130079e7e04c88c44323210dd7fa85dd950bffa84b229ab2546b50628a3df53841f30924cef7b58335cba9430ae7ed54f946044ab0bf40094cab0d681"
