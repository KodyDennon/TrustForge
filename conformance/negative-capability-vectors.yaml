# Negative-capability + EnforcementLevel + expiration cross-language parity
# vectors. Both TS AgentGuard and Rust AgentGuard must produce the listed
# decision kind for the listed query under the listed (negative-cap-list,
# enforcement-level) configuration.
#
# Schema:
#   contract:           inline agent contract used to build the guard
#   negative_capabilities: list of {name, target?, reason?}
#   enforcement_level:  E0..E5 (default E4)
#   query:              {action, target?}
#   expect:             expected GuardDecision.kind value
#
# NOTE: anchors/aliases were expanded — TF-YAML (the in-house
# parser) deliberately does not support them.

contract:
  agent_contract_version: "1"
  contract_id: "tf:contract:test-neg-cap"
  trust_domain: example.com
  agent_actor: "tf:actor:agent:example.com/test"
  actions:
    - name: file.write
      risk: R2
      danger_tags: []
    - name: file.delete
      risk: R3
      danger_tags:
        - destructive
    - name: payment.send
      risk: R4
      danger_tags:
        - financial
      approval: required
vectors:
  - name: negcap-action-only-blocks-everything
    contract:
      agent_contract_version: "1"
      contract_id: "tf:contract:test-neg-cap"
      trust_domain: example.com
      agent_actor: "tf:actor:agent:example.com/test"
      actions:
        - name: file.write
          risk: R2
          danger_tags: []
        - name: file.delete
          risk: R3
          danger_tags:
            - destructive
        - name: payment.send
          risk: R4
          danger_tags:
            - financial
          approval: required
    negative_capabilities:
      - name: file.delete
        reason: never delete on this host
    enforcement_level: E4
    query:
      action: file.delete
      target: "/tmp/x"
    expect: deny
  - name: negcap-with-target-glob-matches
    contract:
      agent_contract_version: "1"
      contract_id: "tf:contract:test-neg-cap"
      trust_domain: example.com
      agent_actor: "tf:actor:agent:example.com/test"
      actions:
        - name: file.write
          risk: R2
          danger_tags: []
        - name: file.delete
          risk: R3
          danger_tags:
            - destructive
        - name: payment.send
          risk: R4
          danger_tags:
            - financial
          approval: required
    negative_capabilities:
      - name: file.write
        target: "/etc/**"
    enforcement_level: E4
    query:
      action: file.write
      target: "/etc/passwd"
    expect: deny
  - name: negcap-with-target-glob-misses
    contract:
      agent_contract_version: "1"
      contract_id: "tf:contract:test-neg-cap"
      trust_domain: example.com
      agent_actor: "tf:actor:agent:example.com/test"
      actions:
        - name: file.write
          risk: R2
          danger_tags: []
        - name: file.delete
          risk: R3
          danger_tags:
            - destructive
        - name: payment.send
          risk: R4
          danger_tags:
            - financial
          approval: required
    negative_capabilities:
      - name: file.write
        target: "/etc/**"
    enforcement_level: E4
    query:
      action: file.write
      target: "/tmp/note.txt"
    expect: allow
  - name: negcap-precedence-over-forbidden
    contract:
