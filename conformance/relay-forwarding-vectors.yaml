# Relay-forwarding parity vectors. Each vector describes a frame
# arriving at a relay with a bound RelayAuthority and the expected
# outcome ("forward" with hop_count_out, or "reject" with reason).
# Both the TS RelayHandler and the Rust relay handler must produce
# identical outcomes.

now: "2026-04-24T12:00:00Z"

vectors:
  - name: simple-forward
    authority:
      relay: tf:actor:relay:example.com/edge
      kinds: [forward-only]
      max_hop_count: 4
      valid_from: "2026-04-24T11:00:00Z"
      valid_until: "2026-04-24T13:00:00Z"
    frame:
      destination: tf:actor:agent:example.com/code-helper
      hop_count: 1
      size_bytes: 256
    expect: forward
    expect_hop_count_out: 2

  - name: hop-cap-rejected
    authority:
      relay: tf:actor:relay:example.com/edge
      kinds: [forward-only]
      max_hop_count: 4
      valid_from: "2026-04-24T11:00:00Z"
      valid_until: "2026-04-24T13:00:00Z"
    frame:
      destination: tf:actor:agent:example.com/code-helper
      hop_count: 4
      size_bytes: 256
    expect: reject
    reason_substring: "hop count"

  - name: expired-frame-rejected
    authority:
      relay: tf:actor:relay:example.com/edge
      kinds: [forward-only]
      max_hop_count: 4
      valid_from: "2026-04-24T11:00:00Z"
      valid_until: "2026-04-24T13:00:00Z"
    frame:
      destination: tf:actor:agent:example.com/code-helper
      hop_count: 0
      size_bytes: 64
      expires_at: "2026-04-24T11:30:00Z"
    expect: reject
    reason_substring: "expired"

  - name: authority-window-exceeded
    authority:
      relay: tf:actor:relay:example.com/edge
      kinds: [forward-only]
      max_hop_count: 4
      valid_from: "2025-01-01T00:00:00Z"
      valid_until: "2025-12-31T23:59:59Z"
    frame:
      destination: tf:actor:agent:example.com/code-helper
      hop_count: 0
      size_bytes: 64
    expect: reject
    reason_substring: "valid_from"
