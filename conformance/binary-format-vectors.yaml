schema_version: 1
description: |
  Binary-format parity vectors for .tfbundle and .tfpkt. The TS encoder
  (`cbor-x` with deterministic mode) and Rust encoder (`ciborium` with
  canonical encoding) must produce byte-identical output for the same
  input. Both decoders must round-trip.

  The body CBOR is RFC 8949 plain encoding. To achieve TS↔Rust parity,
  the YAML keys are encoded in deterministic order: TS calls
  `cborEncode` after key-sorting the input via the canonical sorter so
  the resulting CBOR map keys appear in the same order ciborium emits.

tfbundle:
  - id: "minimal-unsigned"
    input_yaml: |
      bundle_version: "1"
      events: []
      bundle_id: "b1"
      issued_at: "2026-04-24T12:00:00Z"
    expected_hex: "5446424e4401000000000046a46962756e646c655f69646262316e62756e646c655f76657273696f6e6131666576656e747380696973737565645f617474323032362d30342d32345431323a30303a30305a00000000"
    expected_signature_hex: ""
  - id: "with-signature"
    input_yaml: |
      bundle_version: "1"
      events: []
    signature_hex: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    expected_hex: "5446424e440100000000001aa26e62756e646c655f76657273696f6e6131666576656e74738000000040aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
  - id: "encrypted-shape"
    input_yaml: |
      bundle_version: "1"
      ciphertext: "AAAAAAAAAAA="
      nonce: "AAAAAAAAAAAAAAAA"
      wrapped_keys: []
    expected_hex: "5446424e440100000000004fa46e62756e646c655f76657273696f6e61316a636970686572746578746c41414141414141414141413d656e6f6e636570414141414141414141414141414141416c777261707065645f6b6579738000000000"
  - id: "with-many-events"
    input_yaml: |
      bundle_version: "1"
      events:
        - { type: "rpc.call", method: "x.y", call_id: "c1", caller: "tf:actor:x", result: "ok" }
        - { type: "rpc.call", method: "x.z", call_id: "c2", caller: "tf:actor:y", result: "ok" }
    expected_hex: ""

tfpkt:
  - id: "minimal-packet"
    input_yaml: |
      packet_version: "1"
      packet_id: "pkt-1"
      source: "tf:actor:agent:example.com/x"
      destination: "tf:actor:service:example.com/d"
      priority: "P3"
      created_at: "2026-04-24T12:00:00Z"
      encoding: "cbor"
      compression: "none"
      payload: "AAAA"
      signature:
        algorithm: "ed25519"
        signer: "tf:actor:agent:example.com/x"
        signature: "AAAA"
    expected_hex: ""
  - id: "expired-packet"
    input_yaml: |
      packet_version: "1"
      packet_id: "pkt-exp"
      source: "tf:actor:agent:example.com/x"
      destination: "tf:actor:service:example.com/d"
      priority: "P3"
      created_at: "2026-04-22T00:00:00Z"
      expires_at: "2026-04-23T00:00:00Z"
      encoding: "cbor"
      compression: "none"
      payload: "AAAA"
      signature:
        algorithm: "ed25519"
        signer: "tf:actor:agent:example.com/x"
        signature: "AAAA"
    expected_hex: ""
  - id: "emergency-p0"
    input_yaml: |
      packet_version: "1"
      packet_id: "pkt-emerg"
      source: "tf:actor:human:example.com/alice"
      destination: "tf:actor:service:example.com/d"
      priority: "P0"
      emergency: true
      created_at: "2026-04-24T12:00:00Z"
      encoding: "cbor"
      compression: "none"
      payload: "AAAA"
      signature:
        algorithm: "ed25519"
        signer: "tf:actor:human:example.com/alice"
        signature: "AAAA"
    expected_hex: ""
  - id: "fragmented"
    input_yaml: |
      packet_version: "1"
      packet_id: "pkt-frag-0"
      source: "tf:actor:agent:example.com/x"
      destination: "tf:actor:service:example.com/d"
      priority: "P3"
      created_at: "2026-04-24T12:00:00Z"
      encoding: "cbor"
      compression: "none"
      payload: "AAAA"
      fragment:
        fragment_id: "frag-pkt-orig"
        index: 0
        count: 3
        total_payload_bytes: 1024
        payload_digest: "sha256:abcd"
      signature:
        algorithm: "ed25519"
        signer: "tf:actor:agent:example.com/x"
        signature: "AAAA"
    expected_hex: ""
