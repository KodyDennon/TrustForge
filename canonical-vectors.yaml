# Canonical-JSON test vectors shared between the TypeScript and Rust
# implementations of `canonicalize`. Both runtimes must produce the exact
# `output` string for each `input` value.
vectors:
  - name: null-value
    input: null
    output: "null"

  - name: bool-true
    input: true
    output: "true"

  - name: bool-false
    input: false
    output: "false"

  - name: integer
    input: 42
    output: "42"

  - name: negative-integer
    input: -7
    output: "-7"

  - name: float-half
    input: 0.5
    output: "0.5"

  - name: string-ascii
    input: "hello"
    output: "\"hello\""

  - name: string-escaped
    input: "line\nbreak"
    output: "\"line\\nbreak\""

  - name: empty-object
    input: {}
    output: "{}"

  - name: empty-array
    input: []
    output: "[]"

  - name: simple-object
    input: { b: 1, a: 2 }
    output: "{\"a\":2,\"b\":1}"

  - name: nested-object
    input: { a: { y: 2, x: 1 } }
    output: "{\"a\":{\"x\":1,\"y\":2}}"

  - name: nested-arrays
    input: { xs: [2, 1, 3] }
    output: "{\"xs\":[2,1,3]}"

  - name: mixed
    input:
      z: { b: [3, 2, 1], a: "s" }
      y: 1
      x: null
    output: "{\"x\":null,\"y\":1,\"z\":{\"a\":\"s\",\"b\":[3,2,1]}}"
