policy_version: "1"
trust_domain: example.com
engine_hint: cedar
rules:
  - id: allow.file.read
    effect: allow
    action: file.read
    risk_at_most: R1
  - id: deny.shell.exec.without-approval
    effect: deny
    action: shell.exec
    reason: "shell.exec requires explicit human approval in this domain"
  - id: escalate.writes-to-secrets
    effect: escalate
    action_pattern: "^file\\."
    target_patterns: ["secrets/**", ".env"]
    approval: required
    proof_required: L3
continuous_reevaluation:
  triggers: [delegation_change, revocation]
