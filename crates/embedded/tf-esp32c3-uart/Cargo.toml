[package]

name = "tf-esp32c3-uart"
version = "0.1.3"
edition = "2021"
description = "TrustForge embedded firmware for ESP32C3-UART. A bare-metal, no_std implementation for secure verifiable actions on edge hardware."
license = "Apache-2.0"
publish = false

[package.metadata.embedded]
chip = "ESP32-C3"
flash_size = "4M"
ram_size = "400K"
target_triple = "riscv32imc-unknown-none-elf"
profile = "constrained"
spec = "TF-0011 packet-mode L0"

[[bin]]
name = "tf-esp32c3-uart"
path = "src/main.rs"
test = false
bench = false

[dependencies]
tf-core-no-std = { version = "0.1.3", path = "../../tf-core-no-std", default-features = false }
# `tf-embedded-hal` is intentionally NOT pulled in for K6 — its
# `heapless::spsc::Queue` re-export requires atomic load/store, which
# `riscv32imc` lacks (the C-extension is RV32I**M**C, no A). Targets
# that need the HAL traits should either:
#   * upgrade to RV32IMAC (e.g. ESP32-C6 / -H2 / -P4), or
#   * hide the spsc adapter behind a `cfg(target_has_atomic = "8")`.
# The TrustForge sign/verify path has no atomics dependency.

# Espressif's stock-Rust HAL for the C-series chips. Builds on the
# upstream `riscv32imc-unknown-none-elf` target — no `+esp` toolchain
# required for the C3.
esp-hal = { version = "0.21", features = ["esp32c3"], optional = true }
esp-backtrace = { version = "0.14", features = ["esp32c3", "panic-handler", "exception-handler", "println"], optional = true }
esp-println = { version = "0.12", features = ["esp32c3", "log"], optional = true }

riscv = { version = "0.12", default-features = false }
riscv-rt = { version = "0.12", optional = true }

ed25519-compact = { version = "2", default-features = false, features = ["self-verify"] }
heapless = "0.8"
panic-halt = "0.2"

[features]
default = []
hal = ["dep:esp-hal", "dep:esp-backtrace", "dep:esp-println", "dep:riscv-rt"]

[profile.release]
codegen-units = 1
debug = true
lto = "fat"
opt-level = "s"
overflow-checks = false
panic = "abort"

[profile.dev]
codegen-units = 1
debug = true
opt-level = 1
overflow-checks = true
panic = "abort"
