[build]
target = "riscv32imc-unknown-none-elf"

[target.riscv32imc-unknown-none-elf]
runner = "espflash flash --monitor"
# Linker scripts are supplied by esp-hal at build time when the `hal`
# feature is enabled. The default-feature build is bare-metal and uses
# the cargo-default link script; if you want a real binary, pass
# --features hal.
rustflags = [
    "-C", "force-frame-pointers",
]
