[package]
readme.workspace = true
name = "tf-stm32wl-lora"
version = "0.1.1"
edition = "2021"
description = "TrustForge embedded firmware for STM32WL-LORA. A bare-metal, no_std implementation for secure verifiable actions on edge hardware."
license = "Apache-2.0"
publish = false

[package.metadata.embedded]
chip = "STM32WLE5JC"
flash_size = "256K"
ram_size = "64K"
target_triple = "thumbv7em-none-eabihf"
profile = "constrained"
spec = "TF-0011 packet-mode L0"

[[bin]]
name = "tf-stm32wl-lora"
path = "src/main.rs"
test = false
bench = false

[dependencies]
# Core TrustForge embedded crates — pulled by relative path.
tf-core-no-std = { version = "0.1.1", path = "../../tf-core-no-std", default-features = false }
tf-embedded-hal = { version = "0.1.1", path = "../../tf-embedded-hal", default-features = false }

# Cortex-M4F runtime + panic handler.
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"

# STM32WL HAL provides the sub-GHz radio (SX126x-derived) and UART.
stm32wlxx-hal = { version = "0.6", features = ["stm32wle5", "rt"], optional = true }

# Heapless containers for stack-only buffers and a fixed pool.
heapless = "0.8"

# Pure-Rust ed25519 implementation that links on Cortex-M without std.
ed25519-compact = { version = "2", default-features = false, features = ["self-verify"] }

# Optional `defmt` traces over RTT — disabled by default to keep flash
# footprint minimal; enable with `--features defmt-rtt`.
defmt = { version = "0.3", optional = true }
defmt-rtt = { version = "0.4", optional = true }

[features]
default = []
# Compile in the stm32wlxx-hal integration (clock tree, LPUART1, SubGhz
# radio bring-up). Disabled by default so the canonical TrustForge
# sign/verify path is exercised independently of the HAL surface.
hal = ["dep:stm32wlxx-hal"]
# Compile in defmt + RTT logger. Adds ~6 KiB of flash but is invaluable
# during bring-up. Requires `probe-rs run --connect-under-reset`.
defmt-rtt = ["dep:defmt", "dep:defmt-rtt"]

[profile.release]
codegen-units = 1
debug = true            # keep DWARF for probe-rs / itm.
lto = "fat"
opt-level = "s"         # size-optimised; the WL has 256K of flash.
overflow-checks = false
panic = "abort"

[profile.dev]
codegen-units = 1
debug = true
opt-level = 1           # debug builds at -O0 don't fit comfortably; -O1 is the sweet spot.
overflow-checks = true
panic = "abort"
